version: '3'
services:
  discovery:
    build:
      context: discovery
      dockerfile: Dockerfile
    image: acm-discovery:1.0
    ports:
      - "8761:8761"
    restart: always
    container_name: discovery

  neo4j:
    image: neo4j:latest
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - $HOME/neo4j/data:/data

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ACM
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - $HOME/postgres/data:/var/lib/postgresql/data

networks:
  default: